<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raunak Visuals - Final Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#020617;color:white;scroll-behavior:smooth}

/* HEADER */
header{padding:80px 20px;text-align:center;background:linear-gradient(135deg,#0f172a,#020617)}
h1{font-size:50px}
.tagline{color:#38bdf8}

/* SECTIONS */
.section{padding:60px 20px;text-align:center}
.container{display:flex;flex-wrap:wrap;justify-content:center;gap:20px}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:20px;
width:260px;
transition:0.3s;
cursor:pointer;
}
.card:hover{transform:translateY(-10px)}

/* BUTTON */
.btn{
padding:10px 20px;
background:#38bdf8;
border:none;
border-radius:10px;
cursor:pointer;
}

/* INPUT */
input,textarea{
padding:10px;
margin:10px;
border-radius:10px;
border:none;
width:260px;
}

/* ADMIN PANEL */
#loginPage,#adminPanel{display:none;text-align:center;padding:40px}
.logout{background:red;color:white}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
#popupContent{
background:#020617;
padding:20px;
border-radius:20px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:22px;
box-shadow:0 0 10px #25D366;
}

/* FOOTER */
footer{padding:20px;text-align:center;color:#94a3b8}
</style>
</head>

<body>

<header>
<h1>Raunak Visuals </h1>
<p class="tagline">Creative Video Editing & Design</p>
<button class="btn" onclick="scrollToSection('contact')">Hire Me</button>
<button class="btn" onclick="window.location.href='admin.html'" style="position:absolute;top:10px;right:10px;font-size:12px;"></button>
</header>

<!-- SERVICES -->
<div class="section">
<h2>Services</h2>
<div class="container">
<div class="card">Video Editing</div>
<div class="card"> Logo Design</div>
<div class="card">Animation</div>
</div>
</div>

<!-- PORTFOLIO -->
<div class="section">
<h2>Portfolio</h2>
<div class="container" id="portfolio"></div>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
<h2>Contact</h2>
<input id="name" placeholder="Name"><br>
<textarea id="msg" placeholder="Message"></textarea><br>
<button class="btn" onclick="sendWhatsApp()">Send</button>
</div>

<!-- LOGIN -->
<div id="loginPage">
<h2>Admin Login</h2>
<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>
<button class="btn" onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
<h2>Dashboard đź‘‘</h2>
<input id="title" placeholder="Project Title"><br>
<textarea id="desc" placeholder="Project Description"></textarea><br>
<button class="btn" onclick="addProject()">Add Project</button>
<br><br>
<button class="btn logout" onclick="logout()">Logout</button>
</div>

<!-- POPUP -->
<div id="popup" onclick="closePopup()">
<div id="popupContent"></div>
</div>

<footer>© 2026 Raunak Visuals</footer>
<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX" target="_blank"></a>

<script>

// DOM
const loginPage=document.getElementById('loginPage');
const adminPanel=document.getElementById('adminPanel');
const portfolio=document.getElementById('portfolio');

// SCROLL
function scrollToSection(id){
document.getElementById(id).scrollIntoView();
}

// LOAD PROJECTS
function loadPortfolio(){
let data=JSON.parse(localStorage.getItem('projects'))||[
{title:"Edit 1",desc:"Sample project"},
{title:"Edit 2",desc:"Sample project"}
];

portfolio.innerHTML="";

data.forEach(p=>{
portfolio.innerHTML+=`
<div class="card" onclick="openProject('${p.title}','${p.desc}')">
<h3>${p.title}</h3>
<p>${p.desc}</p>
</div>`;
});
}

// POPUP
function openProject(title,desc){
let popup=document.getElementById('popup');
let content=document.getElementById('popupContent');
content.innerHTML=`<h2>${title}</h2><p>${desc}</p>`;
popup.style.display='flex';
}
function closePopup(){
document.getElementById('popup').style.display='none';
}

// LOGIN
function showLogin(){
loginPage.style.display='block';
}
function login(){
if(username.value==='admin' && password.value==='1234'){
loginPage.style.display='none';
adminPanel.style.display='block';
sessionStorage.setItem('login','true');
}else{alert('Wrong');}
}

// LOGOUT
function logout(){
sessionStorage.clear();
adminPanel.style.display='none';
}

// ADD PROJECT
function addProject(){
let t=title.value;
let d=desc.value;

if(t===""||d===""){alert("Fill all");return;}

let data=JSON.parse(localStorage.getItem('projects'))||[];
data.push({title:t,desc:d});
localStorage.setItem('projects',JSON.stringify(data));

alert("Added");
loadPortfolio();
}

// WHATSAPP
function sendWhatsApp(){
let n=name.value;
let m=msg.value;
window.open(`https://wa.me/91XXXXXXXXXX?text=Name:${n}%0AMessage:${m}`);
}

// AUTO LOAD
window.onload=function(){
loadPortfolio();

if(sessionStorage.getItem('login')){
adminPanel.style.display='block';
}
}

</script>

</body>
</html>
